<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapilacaklar Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Top bar: sol taraf bildirim+cikis, sag taraf ayarlar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <button id="notifBtn" title="Bildirimleri Ac">&#128276;</button>
                <button id="logoutBtn">Cikis</button>
            </div>
            <h1>Yapilacaklar Listesi</h1>
            <div class="top-bar-right">
                <span id="userEmail"></span>
                <button id="settingsBtn" title="Ayarlar">&#9881;</button>
            </div>
        </div>

        <div id="authSection">
            <div id="authTabs">
                <button class="auth-tab active" data-tab="login">Giris Yap</button>
                <button class="auth-tab" data-tab="register">Kayit Ol</button>
            </div>
            <form id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="E-posta" required>
                <input type="password" id="loginPassword" placeholder="Sifre" required>
                <button type="submit">Giris Yap</button>
                <p id="loginMsg" class="auth-msg"></p>
            </form>
            <form id="registerForm" class="auth-form" style="display:none">
                <input type="email" id="registerEmail" placeholder="E-posta" required>
                <input type="password" id="registerPassword" placeholder="Sifre (min 6 karakter)" required minlength="6">
                <button type="submit">Kayit Ol</button>
                <p id="registerMsg" class="auth-msg"></p>
            </form>
        </div>

        <div id="appSection" style="display:none">
            <div class="input-row">
                <input type="text" id="todoInput" placeholder="Yeni gorev ekle...">
                <input type="datetime-local" id="dueDateInput" title="Son tarih">
                <select id="priorityInput" title="Oncelik">
                    <option value="1">Dusuk</option>
                    <option value="2" selected>Orta</option>
                    <option value="3">Yuksek</option>
                </select>
                <input type="text" id="tagsInput" placeholder="Etiketler (virgul ile)">
                <button id="addBtn">Ekle</button>
            </div>

            <div class="todo-tables">
                <div class="todo-table-section">
                    <h2 class="group-header active-header">Aktif Gorevler</h2>
                    <div class="table-wrapper">
                        <table class="todo-table">
                            <thead>
                                <tr>
                                    <th class="th-check"></th>
                                    <th class="th-text">Gorev</th>
                                    <th class="th-date">Tarih</th>
                                    <th class="th-time">Saat</th>
                                    <th class="th-priority">Oncelik</th>
                                    <th class="th-tags">Etiketler</th>
                                    <th class="th-overdue">Durum</th>
                                    <th class="th-actions">Islem</th>
                                </tr>
                            </thead>
                            <tbody id="activeTodos"></tbody>
                        </table>
                    </div>
                </div>
                <div class="todo-table-section">
                    <h2 class="group-header completed-header">Tamamlanan Gorevler</h2>
                    <div class="table-wrapper">
                        <table class="todo-table">
                            <thead>
                                <tr>
                                    <th class="th-check"></th>
                                    <th class="th-text">Gorev</th>
                                    <th class="th-date">Tarih</th>
                                    <th class="th-time">Saat</th>
                                    <th class="th-priority">Oncelik</th>
                                    <th class="th-tags">Etiketler</th>
                                    <th class="th-overdue">Durum</th>
                                    <th class="th-actions">Islem</th>
                                </tr>
                            </thead>
                            <tbody id="completedTodos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ayarlar Modali -->
    <div id="settingsModal" class="modal">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3>Kullanici Ayarlari</h3>
                <button class="modal-close" data-close="settingsModal">&times;</button>
            </div>
            <div class="settings-sections">
                <!-- Hesap -->
                <div class="settings-section">
                    <h4>Hesap</h4>
                    <div class="setting-row">
                        <label>E-posta</label>
                        <span id="settingsEmail" class="setting-value"></span>
                    </div>
                </div>
                <!-- Bildirim -->
                <div class="settings-section">
                    <h4>Bildirimler</h4>
                    <div class="setting-row">
                        <label>Bildirim Durumu</label>
                        <button id="settingsNotifToggle" class="setting-btn">Ac</button>
                    </div>
                    <div class="setting-row">
                        <label>Hatirlatma Suresi (dk)</label>
                        <input type="number" id="settingsReminderMin" value="15" min="1" max="120" class="setting-input">
                    </div>
                </div>
                <!-- Varsayilan Degerler -->
                <div class="settings-section">
                    <h4>Varsayilan Degerler</h4>
                    <div class="setting-row">
                        <label>Varsayilan Oncelik</label>
                        <select id="settingsDefaultPriority" class="setting-input">
                            <option value="1">Dusuk</option>
                            <option value="2" selected>Orta</option>
                            <option value="3">Yuksek</option>
                        </select>
                    </div>
                </div>
                <!-- Etiket Yonetimi -->
                <div class="settings-section">
                    <h4>Etiket Yonetimi</h4>
                    <div class="tag-form">
                        <input type="text" id="newTagName" placeholder="Etiket adi">
                        <input type="color" id="newTagColor" value="#e94560">
                        <button id="addTagBtn">Ekle</button>
                    </div>
                    <ul id="tagList"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettingsBtn" class="btn-primary">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
